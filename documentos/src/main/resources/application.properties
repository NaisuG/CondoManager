spring.application.name=documentos
server.port=8084

# --- Base de Datos ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5437/documentos_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Configuración de MinIO ---
minio.url=${MINIO_URL:http://localhost:9005}
minio.access.key=${MINIO_ACCESS_KEY:admin}
minio.secret.key=${MINIO_SECRET_KEY:admin1234}
minio.bucket.name=${MINIO_BUCKET:documentos}

# --- Restricciones de subida de archivos ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB