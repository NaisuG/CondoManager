version: '3.8'

services:
  # ------------------------------------
  # BASES DE DATOS
  # ------------------------------------
  postgres-mantenimiento:
    image: postgres:15-alpine
    container_name: db_mantenimiento
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mantenimiento_db
    ports:
      - "5432:5432"
    restart: always

  db-proveedor:
    image: postgres:15-alpine
    container_name: db_proveedor
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: proveedor_db
    ports:
      - "5433:5432"
    restart: always

  db-registro:
    image: postgres:15-alpine
    container_name: db_registro
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: registro_db
    ports:
      - "5434:5432"
    restart: always

  # ------------------------------------
  # MICROSERVICIOS (SPRING BOOT)
  # ------------------------------------
  app-mantenimiento:
    build: ./mantenimiento
    container_name: ms_mantenimiento
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-mantenimiento:5432/mantenimiento_db
      - PROVEEDOR_URL=http://app-proveedor:8081/api/proveedores
    depends_on:
      - postgres-mantenimiento

  app-proveedor:
    build: ./proveedor
    container_name: ms_proveedor
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-proveedor:5432/proveedor_db
      - SERVER_PORT=8081
    depends_on:
      - db-proveedor

  app-registro:
    build: ./registro
    container_name: ms_registro
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-registro:5432/registro_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SERVER_PORT=8082
    depends_on:
      - db-registro